<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webhook Commander Pro</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/5968/5968756.png">
    <style>
        :root {
            --bg-darker: #1e1f22;
            --bg-sidebar: #2b2d31;
            --bg-main: #313338;
            --bg-card: #383a40;
            --text-normal: #dbdee1;
            --text-muted: #949ba4;
            --blurple: #5865f2;
            --blurple-hover: #4752c4;
            --danger: #fa777c;
            --success: #23a559;
            --border: rgba(0,0,0,0.2);
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'gg sans', sans-serif; 
            background-color: var(--bg-darker); color: var(--text-normal);
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        /* Sidebar: Icon Vault */
        .sidebar { 
            width: 72px; background: var(--bg-darker); display: flex; flex-direction: column; 
            align-items: center; padding: 12px 0; gap: 8px; border-right: 1px solid var(--border);
            overflow-y: auto;
        }
        .profile-icon {
            width: 48px; height: 48px; border-radius: 50%; background: var(--bg-sidebar);
            cursor: pointer; transition: 0.2s; background-size: cover; background-position: center;
            border: 2px solid transparent;
        }
        .profile-icon:hover { border-radius: 30%; border-color: var(--blurple); }
        
        .add-icon {
            width: 48px; height: 48px; border-radius: 50%; background: var(--bg-sidebar);
            display: flex; align-items: center; justify-content: center; font-size: 24px;
            color: var(--success); cursor: pointer; transition: 0.2s;
        }
        .add-icon:hover { background: var(--success); color: white; border-radius: 30%; }

        /* Main Workspace */
        .main { flex: 1; background: var(--bg-main); overflow-y: auto; padding: 20px; }
        .workspace { max-width: 850px; margin: 0 auto; }

        .card { background: var(--bg-card); border-radius: 8px; padding: 15px; margin-bottom: 20px; border: 1px solid var(--border); }
        .section-label { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; display: block; }
        
        input[type="text"] { 
            width: 100%; background: var(--bg-darker); border: 1px solid transparent; color: white;
            padding: 10px; border-radius: 4px; outline: none; margin-bottom: 10px; font-size: 14px;
        }
        input:focus { border-color: var(--blurple); }

        /* Full Featured Toolbar */
        .editor-wrap { background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 15px; }
        .toolbar { background: #2b2d31; padding: 8px; display: flex; gap: 4px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
        .toolbar button { background: transparent; border: none; color: var(--text-normal); cursor: pointer; font-size: 14px; padding: 5px 10px; border-radius: 3px; }
        .toolbar button:hover { background: #4e5058; color: white; }
        .toolbar .sep { width: 1px; height: 20px; background: #4e5058; margin: 0 5px; align-self: center; }

        #editor { min-height: 200px; padding: 20px; outline: none; line-height: 1.6; background: #383a40; font-size: 15px; }
        #editor h1 { font-size: 24px; margin: 10px 0; }
        #editor h2 { font-size: 20px; margin: 8px 0; }
        #editor h3 { font-size: 16px; margin: 5px 0; }
        #editor blockquote { border-left: 4px solid #4e5058; padding-left: 10px; color: var(--text-muted); }
        #editor code { background: #232428; padding: 2px 4px; border-radius: 4px; font-family: monospace; }

        /* Preview */
        .discord-preview { 
            background: #2b2d31; padding: 15px; border-radius: 8px; display: flex; gap: 14px; 
            border: 1px solid var(--border); margin-top: 10px;
        }
        .prev-pfp { width: 40px; height: 40px; border-radius: 50%; background: var(--blurple); flex-shrink: 0; background-size: cover; }
        .prev-name { font-weight: 600; color: white; }
        .prev-tag { background: var(--blurple); font-size: 10px; padding: 1px 4px; border-radius: 3px; color: white; font-weight: bold; margin-left: 5px; }

        .btn-row { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 12px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-send { background: var(--blurple); color: white; flex: 2; font-size: 16px; }
        .btn-save { background: var(--success); color: white; }
        
        #toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 4px; color: white; transform: translateY(100px); transition: 0.3s; font-weight: bold; z-index: 1000; }
        #toast.show { transform: translateY(0); }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="add-icon" onclick="clearAll()" title="Clear Workspace">+</div>
        <div style="width: 32px; height: 1px; background: #4e5058; margin: 5px 0;"></div>
        <div id="profileIcons"></div>
    </div>

    <div class="main">
        <div class="workspace">
            <div class="card">
                <span class="section-label">Target Hook</span>
                <input type="text" id="webhookUrl" placeholder="Paste Webhook URL here...">
                
                <div style="display: flex; gap: 10px; margin-top: 5px;">
                    <div style="flex: 1;">
                        <span class="section-label">Identity Name</span>
                        <input type="text" id="botName" placeholder="Default" oninput="updateUI()">
                    </div>
                    <div style="flex: 1;">
                        <span class="section-label">Avatar URL</span>
                        <input type="text" id="botAvatar" placeholder="https://..." oninput="updateUI()">
                    </div>
                </div>
            </div>

            <div class="editor-wrap">
                <div class="toolbar">
                    <button onclick="exec('bold')" title="Bold"><b>B</b></button>
                    <button onclick="exec('italic')" title="Italic"><i>I</i></button>
                    <button onclick="exec('underline')" title="Underline"><u>U</u></button>
                    <button onclick="exec('strikeThrough')" title="Strikethrough"><s>S</s></button>
                    <div class="sep"></div>
                    <button onclick="exec('formatBlock', 'h1')"><b>H1</b></button>
                    <button onclick="exec('formatBlock', 'h2')"><b>H2</b></button>
                    <button onclick="exec('formatBlock', 'h3')"><b>H3</b></button>
                    <div class="sep"></div>
                    <button onclick="exec('formatBlock', 'blockquote')">Quote</button>
                    <button onclick="applyCode()">Code</button>
                    <button onclick="exec('removeFormat')">Clear Style</button>
                </div>
                <div id="editor" contenteditable="true" oninput="updateUI()"></div>
            </div>

            <span class="section-label">Message Preview</span>
            <div class="discord-preview">
                <div class="prev-pfp" id="prevPfp"></div>
                <div class="discord-content">
                    <div>
                        <span class="prev-name" id="prevName">Webhook</span>
                        <span class="prev-tag">BOT</span>
                        <span style="color: var(--text-muted); font-size: 12px; margin-left: 8px;">Today at 11:48 PM</span>
                    </div>
                    <div id="prevBody" style="white-space: pre-wrap; color: #dbdee1;">...</div>
                </div>
            </div>

            <div class="btn-row">
                <button class="btn btn-save" onclick="saveToVault()">Save to Sidebar</button>
                <button class="btn btn-send" onclick="send()">Send to Discord</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        let profiles = JSON.parse(localStorage.getItem('wh_vault_v2') || '[]');

        window.onload = () => {
            renderSidebar();
            // Load Drafts
            document.getElementById('webhookUrl').value = localStorage.getItem('d_url') || '';
            document.getElementById('botName').value = localStorage.getItem('d_name') || '';
            document.getElementById('botAvatar').value = localStorage.getItem('d_pfp') || '';
            document.getElementById('editor').innerHTML = localStorage.getItem('d_msg') || '';
            updateUI();
        };

        function updateUI() {
            const name = document.getElementById('botName').value || 'Webhook';
            const pfp = document.getElementById('botAvatar').value || 'https://cdn.discordapp.com/embed/avatars/0.png';
            
            document.getElementById('prevName').innerText = name;
            document.getElementById('prevPfp').style.backgroundImage = `url('${pfp}')`;
            document.getElementById('prevBody').innerHTML = document.getElementById('editor').innerHTML || '...';

            localStorage.setItem('d_url', document.getElementById('webhookUrl').value);
            localStorage.setItem('d_name', document.getElementById('botName').value);
            localStorage.setItem('d_pfp', document.getElementById('botAvatar').value);
            localStorage.setItem('d_msg', document.getElementById('editor').innerHTML);
        }

        function exec(cmd, val = null) { document.execCommand(cmd, false, val); updateUI(); }

        function applyCode() {
            const sel = window.getSelection();
            const el = document.createElement("code");
            el.textContent = sel.toString() || "code";
            const range = sel.getRangeAt(0);
            range.deleteContents();
            range.insertNode(el);
            updateUI();
        }

        function saveToVault() {
            const url = document.getElementById('webhookUrl').value;
            if(!url) return showToast("No URL to save!", false);

            profiles.push({
                url: url,
                name: document.getElementById('botName').value,
                pfp: document.getElementById('botAvatar').value
            });
            localStorage.setItem('wh_vault_v2', JSON.stringify(profiles));
            renderSidebar();
            showToast("Profile added to sidebar!");
        }

        function renderSidebar() {
            const container = document.getElementById('profileIcons');
            container.innerHTML = '';
            profiles.forEach((p, i) => {
                const icon = document.createElement('div');
                icon.className = 'profile-icon';
                icon.style.backgroundImage = `url('${p.pfp || 'https://cdn.discordapp.com/embed/avatars/1.png'}')`;
                icon.title = p.name || "Webhook Profile";
                
                icon.onclick = () => {
                    document.getElementById('webhookUrl').value = p.url;
                    document.getElementById('botName').value = p.name;
                    document.getElementById('botAvatar').value = p.pfp;
                    updateUI();
                };

                icon.oncontextmenu = (e) => {
                    e.preventDefault();
                    if(confirm("Delete this saved profile?")) {
                        profiles.splice(i, 1);
                        localStorage.setItem('wh_vault_v2', JSON.stringify(profiles));
                        renderSidebar();
                    }
                };
                container.appendChild(icon);
            });
        }

        function clearAll() {
            if(confirm("Clear everything?")) {
                document.getElementById('editor').innerHTML = '';
                document.getElementById('botName').value = '';
                document.getElementById('botAvatar').value = '';
                document.getElementById('webhookUrl').value = '';
                updateUI();
            }
        }

        function showToast(msg, success = true) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.background = success ? 'var(--success)' : 'var(--danger)';
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        async function send() {
            const url = document.getElementById('webhookUrl').value;
            if(!url) return showToast("Missing Webhook URL!", false);

            // Basic Markdown Conversion for Discord
            let content = document.getElementById('editor').innerHTML
                .replace(/<h1>(.*?)<\/h1>/g, "# $1\n")
                .replace(/<h2>(.*?)<\/h2>/g, "## $1\n")
                .replace(/<h3>(.*?)<\/h3>/g, "### $1\n")
                .replace(/<b>(.*?)<\/b>|<strong>(.*?)<\/strong>/g, "**$1$2**")
                .replace(/<i>(.*?)<\/i>|<em>(.*?)<\/em>/g, "*$1$2*")
                .replace(/<u>(.*?)<\/u>/g, "__$1__")
                .replace(/<s>(.*?)<\/s>|<strike>(.*?)<\/strike>/g, "~~$1$2~~")
                .replace(/<code>(.*?)<\/code>/g, "`$1`")
                .replace(/<blockquote>(.*?)<\/blockquote>/g, "> $1\n")
                .replace(/<div>/g, "\n").replace(/<\/div>/g, "")
                .replace(/<br>/g, "\n")
                .replace(/<[^>]*>/g, "").trim();

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        content: content,
                        username: document.getElementById('botName').value,
                        avatar_url: document.getElementById('botAvatar').value
                    })
                });
                if(res.ok) showToast("Sent successfully!");
                else showToast("Discord rejected the message", false);
            } catch(e) { showToast("Connection failed", false); }
        }
    </script>
</body>
</html>
