<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webhook Commander</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/5968/5968756.png">
    <style>
        :root {
            --bg-darker: #1e1f22;
            --bg-sidebar: #2b2d31;
            --bg-main: #313338;
            --bg-card: #383a40;
            --text-normal: #dbdee1;
            --text-muted: #949ba4;
            --blurple: #5865f2;
            --blurple-hover: #4752c4;
            --danger: #fa777c;
            --success: #23a559;
            --border: rgba(0,0,0,0.2);
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'gg sans', sans-serif; 
            background-color: var(--bg-darker); color: var(--text-normal);
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        /* Sidebar: Icon Grid Style */
        .sidebar { 
            width: 72px; background: var(--bg-darker); display: flex; flex-direction: column; 
            align-items: center; padding: 12px 0; gap: 8px; border-right: 1px solid var(--border);
            overflow-y: auto;
        }
        .profile-icon {
            width: 48px; height: 48px; border-radius: 50%; background: var(--bg-sidebar);
            cursor: pointer; transition: 0.2s; background-size: cover; background-position: center;
            position: relative; border: 2px solid transparent;
        }
        .profile-icon:hover { border-radius: 30%; border-color: var(--blurple); }
        .profile-icon.active { border-radius: 30%; border-color: white; }
        
        .add-icon {
            width: 48px; height: 48px; border-radius: 50%; background: var(--bg-sidebar);
            display: flex; align-items: center; justify-content: center; font-size: 24px;
            color: var(--success); cursor: pointer; transition: 0.2s;
        }
        .add-icon:hover { background: var(--success); color: white; border-radius: 30%; }

        /* Main Content */
        .main { flex: 1; background: var(--bg-main); overflow-y: auto; padding: 20px; }
        .workspace { max-width: 800px; margin: 0 auto; }

        .card { background: var(--bg-card); border-radius: 8px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); }
        .section-label { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; display: block; }
        
        input[type="text"] { 
            width: 100%; background: var(--bg-darker); border: 1px solid transparent; color: white;
            padding: 12px; border-radius: 4px; outline: none; margin-bottom: 10px; font-size: 14px;
        }
        input:focus { border-color: var(--blurple); }

        /* Editor & Preview */
        .editor-wrap { background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 20px; }
        .toolbar { background: #2b2d31; padding: 10px; display: flex; gap: 8px; border-bottom: 1px solid var(--border); }
        .toolbar button { background: transparent; border: none; color: var(--text-normal); cursor: pointer; font-size: 16px; padding: 4px 8px; }
        #editor { min-height: 150px; padding: 20px; outline: none; line-height: 1.6; background: #383a40; font-size: 15px; }

        .discord-preview { 
            background: #2b2d31; padding: 15px; border-radius: 8px; display: flex; gap: 14px; 
            border: 1px solid var(--border); margin-top: 10px;
        }
        .prev-pfp { width: 40px; height: 40px; border-radius: 50%; background: var(--blurple); flex-shrink: 0; background-size: cover; }
        .prev-name { font-weight: 600; color: white; margin-right: 5px; }
        .prev-tag { background: var(--blurple); font-size: 10px; padding: 1px 4px; border-radius: 3px; color: white; font-weight: bold; }

        .btn-row { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 15px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-send { background: var(--blurple); color: white; flex: 2; }
        .btn-save { background: var(--success); color: white; }
        
        #toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 4px; color: white; transform: translateY(100px); transition: 0.3s; }
        #toast.show { transform: translateY(0); }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="add-icon" onclick="clearInputs()" title="New/Clear Message">+</div>
        <div style="width: 32px; height: 2px; background: #4e5058; margin: 4px 0;"></div>
        <div id="profileIcons"></div>
    </div>

    <div class="main">
        <div class="workspace">
            <div class="card">
                <span class="section-label">Target Destination</span>
                <input type="text" id="webhookUrl" placeholder="https://discord.com/api/webhooks/...">
                
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <div style="flex: 1;">
                        <span class="section-label">Bot Name</span>
                        <input type="text" id="botName" placeholder="Spidey Bot" oninput="updateUI()">
                    </div>
                    <div style="flex: 1;">
                        <span class="section-label">Avatar URL</span>
                        <input type="text" id="botAvatar" placeholder="https://..." oninput="updateUI()">
                    </div>
                </div>
            </div>

            <div class="editor-wrap">
                <div class="toolbar">
                    <button onclick="exec('bold')"><b>B</b></button>
                    <button onclick="exec('italic')"><i>I</i></button>
                    <button onclick="exec('underline')"><u>U</u></button>
                    <button onclick="exec('formatBlock', 'blockquote')">Quote</button>
                </div>
                <div id="editor" contenteditable="true" oninput="updateUI()"></div>
            </div>

            <span class="section-label">Live Preview</span>
            <div class="discord-preview">
                <div class="prev-pfp" id="prevPfp"></div>
                <div class="discord-content">
                    <div style="margin-bottom: 4px;">
                        <span class="prev-name" id="prevName">Webhook</span>
                        <span class="prev-tag">BOT</span>
                        <span style="color: var(--text-muted); font-size: 12px; margin-left: 5px;">Today at 4:20 PM</span>
                    </div>
                    <div id="prevBody" style="white-space: pre-wrap;">...</div>
                </div>
            </div>

            <div class="btn-row">
                <button class="btn btn-save" onclick="saveProfile()">Save to Sidebar</button>
                <button class="btn btn-send" onclick="send()">Send Message</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        let profiles = JSON.parse(localStorage.getItem('wh_vault') || '[]');

        window.onload = () => {
            renderSidebar();
            // Load Last Draft
            document.getElementById('webhookUrl').value = localStorage.getItem('draft_url') || '';
            document.getElementById('botName').value = localStorage.getItem('draft_name') || '';
            document.getElementById('botAvatar').value = localStorage.getItem('draft_pfp') || '';
            document.getElementById('editor').innerHTML = localStorage.getItem('draft_msg') || '';
            updateUI();
        };

        function updateUI() {
            const name = document.getElementById('botName').value || 'Webhook';
            const pfp = document.getElementById('botAvatar').value || 'https://cdn.discordapp.com/embed/avatars/0.png';
            const body = document.getElementById('editor').innerText || 'Your message...';

            document.getElementById('prevName').innerText = name;
            document.getElementById('prevPfp').style.backgroundImage = `url('${pfp}')`;
            document.getElementById('prevBody').innerText = body;

            // Save Draft
            localStorage.setItem('draft_url', document.getElementById('webhookUrl').value);
            localStorage.setItem('draft_name', document.getElementById('botName').value);
            localStorage.setItem('draft_pfp', document.getElementById('botAvatar').value);
            localStorage.setItem('draft_msg', document.getElementById('editor').innerHTML);
        }

        function exec(cmd) { document.execCommand(cmd, false, null); updateUI(); }

        function saveProfile() {
            const url = document.getElementById('webhookUrl').value;
            const name = document.getElementById('botName').value;
            const pfp = document.getElementById('botAvatar').value;

            if(!url) return showToast("Need a Webhook URL to save!", false);

            const newProfile = { url, name, pfp };
            profiles.push(newProfile);
            localStorage.setItem('wh_vault', JSON.stringify(profiles));
            renderSidebar();
            showToast("Profile Saved to Vault!");
        }

        function renderSidebar() {
            const container = document.getElementById('profileIcons');
            container.innerHTML = '';
            profiles.forEach((p, i) => {
                const icon = document.createElement('div');
                icon.className = 'profile-icon';
                icon.style.backgroundImage = `url('${p.pfp || 'https://cdn.discordapp.com/embed/avatars/0.png'}')`;
                icon.title = p.name || "Unnamed Profile";
                
                // Right click to delete
                icon.oncontextmenu = (e) => {
                    e.preventDefault();
                    if(confirm("Delete this profile?")) {
                        profiles.splice(i, 1);
                        localStorage.setItem('wh_vault', JSON.stringify(profiles));
                        renderSidebar();
                    }
                };

                icon.onclick = () => {
                    document.getElementById('webhookUrl').value = p.url;
                    document.getElementById('botName').value = p.name;
                    document.getElementById('botAvatar').value = p.pfp;
                    updateUI();
                    showToast(`Loaded: ${p.name || 'Profile'}`);
                };
                container.appendChild(icon);
            });
        }

        function clearInputs() {
            if(confirm("Clear current message?")) {
                document.getElementById('editor').innerHTML = '';
                updateUI();
            }
        }

        function showToast(msg, success = true) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.background = success ? 'var(--success)' : 'var(--danger)';
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        async function send() {
            const url = document.getElementById('webhookUrl').value;
            if(!url) return showToast("Missing Webhook URL!", false);

            const content = document.getElementById('editor').innerText;
            const username = document.getElementById('botName').value;
            const avatar_url = document.getElementById('botAvatar').value;

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ content, username, avatar_url })
                });
                if(res.ok) showToast("Message Sent!");
                else showToast("Discord Error", false);
            } catch(e) { showToast("Network Error", false); }
        }
    </script>
</body>
</html>
