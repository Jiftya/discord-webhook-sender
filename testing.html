<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webhook Commander</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/5968/5968756.png">
    <style>
        :root {
            --bg-darker: #1e1f22;
            --bg-sidebar: #2b2d31;
            --bg-main: #313338;
            --bg-card: #383a40;
            --text-normal: #dbdee1;
            --text-muted: #949ba4;
            --blurple: #5865f2;
            --blurple-hover: #4752c4;
            --danger: #fa777c;
            --success: #23a559;
            --border: rgba(0,0,0,0.2);
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'gg sans', sans-serif; 
            background-color: var(--bg-darker); color: var(--text-normal);
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        .sidebar { 
            width: 72px; background: var(--bg-darker); display: flex; flex-direction: column; 
            align-items: center; padding: 12px 0; gap: 8px; border-right: 1px solid var(--border);
            overflow-y: auto;
        }
        .profile-icon {
            width: 48px; height: 48px; border-radius: 50%; background: var(--bg-sidebar);
            cursor: pointer; transition: 0.2s; background-size: cover; background-position: center;
            border: 2px solid transparent;
        }
        .profile-icon:hover { border-radius: 30%; border-color: var(--blurple); }
        
        .save-icon {
            width: 48px; height: 48px; border-radius: 50%; background: var(--bg-sidebar);
            display: flex; align-items: center; justify-content: center; font-size: 24px;
            color: var(--success); cursor: pointer; transition: 0.2s;
        }
        .save-icon:hover { background: var(--success); color: white; border-radius: 30%; }

        .main { flex: 1; background: var(--bg-main); overflow-y: auto; padding: 20px; }
        .workspace { max-width: 850px; margin: 0 auto; padding-bottom: 50px; }

        .card { background: var(--bg-card); border-radius: 8px; padding: 15px; margin-bottom: 20px; border: 1px solid var(--border); }
        .section-label { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; display: block; }
        
        input[type="text"] { 
            width: 100%; background: var(--bg-darker); border: 1px solid transparent; color: white;
            padding: 10px; border-radius: 4px; outline: none; margin-bottom: 10px; font-size: 14px;
        }
        input:focus { border-color: var(--blurple); }

        .editor-wrap { background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 15px; }
        .toolbar { background: #2b2d31; padding: 8px; display: flex; gap: 4px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
        .toolbar button { background: transparent; border: none; color: var(--text-normal); cursor: pointer; font-size: 14px; padding: 5px 10px; border-radius: 3px; }
        .toolbar button:hover { background: #4e5058; color: white; }
        .toolbar .sep { width: 1px; height: 20px; background: #4e5058; margin: 0 5px; align-self: center; }

        #editor { min-height: 200px; padding: 20px; outline: none; line-height: 1.6; background: #383a40; font-size: 15px; color: white; }
        
        .discord-preview { 
            background: #2b2d31; padding: 15px; border-radius: 8px; display: flex; gap: 14px; 
            border: 1px solid var(--border); margin-top: 10px;
        }
        .prev-pfp { width: 40px; height: 40px; border-radius: 50%; background: var(--blurple); flex-shrink: 0; background-size: cover; background-position: center; }
        .prev-name { font-weight: 600; color: white; }
        .prev-tag { background: var(--blurple); font-size: 10px; padding: 1px 4px; border-radius: 3px; color: white; font-weight: bold; margin-left: 5px; }

        .btn-send { 
            width: 100%; padding: 18px; border-radius: 8px; border: none; 
            font-weight: bold; cursor: pointer; transition: 0.2s;
            background: var(--blurple); color: white; font-size: 18px; margin-top: 25px;
        }
        .btn-send:hover { background: var(--blurple-hover); }
        
        #toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 4px; color: white; transform: translateY(100px); transition: 0.3s; font-weight: bold; z-index: 1000; }
        #toast.show { transform: translateY(0); }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="save-icon" onclick="saveToVault()" title="Save Profile">+</div>
        <div style="width: 32px; height: 1px; background: #4e5058; margin: 5px 0;"></div>
        <div id="profileIcons"></div>
    </div>

    <div class="main">
        <div class="workspace">
            <div class="card">
                <span class="section-label">Target Hook</span>
                <input type="text" id="webhookUrl" placeholder="Webhook URL">
                <div style="display: flex; gap: 10px; margin-top: 5px;">
                    <div style="flex: 1;">
                        <span class="section-label">Bot Name</span>
                        <input type="text" id="botName" placeholder="Bot Name" oninput="updateUI()">
                    </div>
                    <div style="flex: 1;">
                        <span class="section-label">Avatar URL</span>
                        <input type="text" id="botAvatar" placeholder="Avatar URL" oninput="updateUI()">
                    </div>
                </div>
            </div>

            <div class="editor-wrap">
                <div class="toolbar">
                    <button onclick="exec('bold')"><b>B</b></button>
                    <button onclick="exec('italic')"><i>I</i></button>
                    <button onclick="exec('underline')"><u>U</u></button>
                    <button onclick="exec('strikeThrough')"><s>S</s></button>
                    <div class="sep"></div>
                    <button onclick="exec('formatBlock', 'h1')">H1</button>
                    <button onclick="exec('formatBlock', 'h2')">H2</button>
                    <button onclick="exec('formatBlock', 'h3')">H3</button>
                    <div class="sep"></div>
                    <button onclick="exec('formatBlock', 'blockquote')">Quote</button>
                    <button onclick="applyCode()">Code</button>
                    <button onclick="clearEditor()" style="margin-left:auto; color:var(--danger)">Wipe</button>
                </div>
                <div id="editor" contenteditable="true" oninput="updateUI()"></div>
            </div>

            <span class="section-label">Preview</span>
            <div class="discord-preview">
                <div class="prev-pfp" id="prevPfp"></div>
                <div class="discord-content">
                    <div><span class="prev-name" id="prevName">Webhook</span><span class="prev-tag">APP</span></div>
                    <div id="prevBody" style="white-space: pre-wrap;">...</div>
                </div>
            </div>

            <button class="btn-send" onclick="send()">SEND TO DISCORD</button>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        let profiles = JSON.parse(localStorage.getItem('wh_vault_final_v6') || '[]');

        window.onload = () => {
            renderSidebar();
            document.getElementById('webhookUrl').value = localStorage.getItem('d_url') || '';
            document.getElementById('botName').value = localStorage.getItem('d_name') || '';
            document.getElementById('botAvatar').value = localStorage.getItem('d_pfp') || '';
            document.getElementById('editor').innerHTML = localStorage.getItem('d_msg') || '';
            updateUI();
        };

        function updateUI() {
            const pfp = document.getElementById('botAvatar').value || 'https://cdn.discordapp.com/embed/avatars/0.png';
            document.getElementById('prevName').innerText = document.getElementById('botName').value || 'Webhook';
            document.getElementById('prevPfp').style.backgroundImage = `url('${pfp}')`;
            document.getElementById('prevBody').innerHTML = document.getElementById('editor').innerHTML;

            localStorage.setItem('d_url', document.getElementById('webhookUrl').value);
            localStorage.setItem('d_name', document.getElementById('botName').value);
            localStorage.setItem('d_pfp', document.getElementById('botAvatar').value);
            localStorage.setItem('d_msg', document.getElementById('editor').innerHTML);
        }

        function exec(cmd, val = null) { document.execCommand(cmd, false, val); updateUI(); }

        function applyCode() {
            const sel = window.getSelection();
            if (!sel.toString()) return;
            const el = document.createElement("code");
            el.textContent = sel.toString();
            const range = sel.getRangeAt(0);
            range.deleteContents();
            range.insertNode(el);
            updateUI();
        }

        function clearEditor() {
            if(confirm("Wipe editor?")) { document.getElementById('editor').innerHTML = ''; updateUI(); }
        }

        function saveToVault() {
            const url = document.getElementById('webhookUrl').value;
            if(!url) return showToast("No URL!", false);
            profiles.push({ url, name: document.getElementById('botName').value, pfp: document.getElementById('botAvatar').value });
            localStorage.setItem('wh_vault_final_v6', JSON.stringify(profiles));
            renderSidebar();
            showToast("Saved!");
        }

        function renderSidebar() {
            const container = document.getElementById('profileIcons');
            container.innerHTML = '';
            profiles.forEach((p, i) => {
                const icon = document.createElement('div');
                icon.className = 'profile-icon';
                icon.style.backgroundImage = `url('${p.pfp || 'https://cdn.discordapp.com/embed/avatars/1.png'}')`;
                icon.onclick = () => {
                    document.getElementById('webhookUrl').value = p.url;
                    document.getElementById('botName').value = p.name;
                    document.getElementById('botAvatar').value = p.pfp;
                    updateUI();
                };
                icon.oncontextmenu = (e) => {
                    e.preventDefault();
                    if(confirm("Delete?")) { profiles.splice(i, 1); localStorage.setItem('wh_vault_final_v6', JSON.stringify(profiles)); renderSidebar(); }
                };
                container.appendChild(icon);
            });
        }

        function showToast(msg, success = true) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.background = success ? 'var(--success)' : 'var(--danger)';
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        async function send() {
            const url = document.getElementById('webhookUrl').value;
            if(!url) return showToast("Missing URL!", false);

            let html = document.getElementById('editor').innerHTML;

            // SMART SHRINKWRAP: Moves spaces OUT of the tags so the symbols touch the letters
            let content = html
                .replace(/<h1>\s*(.*?)\s*<\/h1>/g, "# $1\n")
                .replace(/<h2>\s*(.*?)\s*<\/h2>/g, "## $1\n")
                .replace(/<h3>\s*(.*?)\s*<\/h3>/g, "### $1\n")
                // Pulls spaces outside the bold/italic markers
                .replace(/<b>(\s*)(.*?)(\s*)<\/b>/g, "$1**$2**$3")
                .replace(/<strong>(\s*)(.*?)(\s*)<\/strong>/g, "$1**$2**$3")
                .replace(/<i>(\s*)(.*?)(\s*)<\/i>/g, "$1*$2*$3")
                .replace(/<em>(\s*)(.*?)(\s*)<\/em>/g, "$1*$2*$3")
                .replace(/<u>(\s*)(.*?)(\s*)<\/u>/g, "$1__$2__$3")
                .replace(/<s>(\s*)(.*?)(\s*)<\/s>/g, "$1~~$2~~$3")
                .replace(/<code>(\s*)(.*?)(\s*)<\/code>/g, "$1`$2`$3")
                .replace(/&nbsp;/g, " ")
                .replace(/<div>/g, "\n").replace(/<\/div>/g, "")
                .replace(/<br>/g, "\n")
                .replace(/<[^>]*>/g, "").trim();

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        content: content,
                        username: document.getElementById('botName').value,
                        avatar_url: document.getElementById('botAvatar').value
                    })
                });
                if(res.ok) { showToast("Sent!"); document.getElementById('editor').innerHTML = ''; updateUI(); }
                else showToast("Error", false);
            } catch(e) { showToast("Failed", false); }
        }
    </script>
</body>
</html>
