<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webhook Dashboard</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/5968/5968756.png">
    <style>
        :root {
            --bg-darker: #1e1f22;
            --bg-sidebar: #2b2d31;
            --bg-main: #313338;
            --bg-card: #383a40;
            --text-white: #ffffff;
            --text-normal: #dbdee1;
            --text-muted: #949ba4;
            --blurple: #5865f2;
            --blurple-hover: #4752c4;
            --danger: #fa777c;
            --success: #23a559;
            --border: rgba(0,0,0,0.2);
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'gg sans', 'Helvetica Neue', Arial, sans-serif; 
            background-color: var(--bg-darker); color: var(--text-normal);
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        /* Sidebar - Profiles & Templates */
        .sidebar { 
            width: 280px; background: var(--bg-sidebar); display: flex; flex-direction: column;
            border-right: 1px solid var(--border);
        }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 15px; }
        .section-label { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; display: block; }

        /* Main Content Area */
        .main { flex: 1; background: var(--bg-main); display: flex; flex-direction: column; overflow-y: auto; }
        .top-nav { height: 50px; background: var(--bg-main); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; font-weight: bold; color: white; }

        /* Components */
        .card { background: var(--bg-card); border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        input[type="text"] { 
            width: 100%; background: var(--bg-darker); border: 1px solid transparent; color: white;
            padding: 10px; border-radius: 4px; outline: none; margin-bottom: 8px;
        }
        input:focus { border-color: var(--blurple); }

        .btn { 
            cursor: pointer; border: none; border-radius: 4px; padding: 8px 12px; 
            font-weight: 500; transition: 0.2s; font-size: 13px;
        }
        .btn-primary { background: var(--blurple); color: white; }
        .btn-primary:hover { background: var(--blurple-hover); }
        .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--text-muted); }
        .btn-ghost:hover { color: white; border-color: white; }

        /* Chips */
        .chip { 
            background: var(--bg-darker); padding: 8px 12px; border-radius: 4px; margin-bottom: 6px;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s;
        }
        .chip:hover { background: #404249; }
        .chip.active { border-left: 4px solid var(--blurple); background: #404249; }
        .chip-actions { display: none; gap: 5px; }
        .chip:hover .chip-actions { display: flex; }

        /* Workspace */
        .workspace { max-width: 900px; width: 100%; margin: 0 auto; padding: 30px 20px; }
        .editor-wrap { background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
        .toolbar { background: #2b2d31; padding: 8px; display: flex; gap: 5px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
        .toolbar button { background: transparent; border: none; color: var(--text-normal); padding: 5px 8px; border-radius: 3px; cursor: pointer; font-size: 16px; }
        .toolbar button:hover { background: #4e5058; color: white; }
        
        #editor { min-height: 250px; padding: 20px; outline: none; line-height: 1.6; font-size: 15px; background: #383a40; }
        .editor-footer { background: #2b2d31; padding: 8px 15px; display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); }

        .identity-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 10px; }
        
        /* Toggle Styling */
        .toggle-row { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text-muted); margin-top: 5px; }
        
        #status-toast {
            position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; 
            border-radius: 4px; color: white; font-weight: bold; transform: translateY(100px);
            transition: 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 1000;
        }
        #status-toast.show { transform: translateY(0); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2 style="font-size: 18px; margin: 0; color: white;">Webhook Commander</h2>
        </div>
        
        <div class="sidebar-content">
            <span class="section-label">Profiles (Webhooks + ID)</span>
            <div id="profileList"></div>
            <button class="btn btn-ghost" style="width: 100%; margin-top: 10px;" onclick="addProfile()">+ New Profile</button>

            <div style="margin-top: 30px;">
                <span class="section-label">Templates (Messages)</span>
                <div id="templateList"></div>
                <button class="btn btn-ghost" style="width: 100%; margin-top: 10px;" onclick="saveAsTemplate()">+ Save to Template</button>
            </div>
        </div>
    </div>

    <div class="main">
        <div class="top-nav">
            <span id="activeProfileName">Select a Profile</span>
        </div>

        <div class="workspace">
            <div class="card">
                <span class="section-label">Profile Identity</span>
                <div class="identity-grid">
                    <div>
                        <label style="font-size: 11px; color: var(--text-muted);">BOT NAME</label>
                        <input type="text" id="botName" placeholder="Default Webhook Name" oninput="saveDraft()">
                    </div>
                    <div>
                        <label style="font-size: 11px; color: var(--text-muted);">AVATAR URL</label>
                        <input type="text" id="botAvatar" placeholder="https://..." oninput="saveDraft()">
                    </div>
                </div>
                <div class="toggle-row">
                    <input type="checkbox" id="linkIdentity" checked>
                    <span>Automatically update this Profile's Identity when saving</span>
                </div>
            </div>

            <div class="editor-wrap">
                <div class="toolbar">
                    <button onclick="exec('bold')"><b>B</b></button>
                    <button onclick="exec('italic')"><i>i</i></button>
                    <button onclick="exec('underline')"><u>U</u></button>
                    <button onclick="exec('strikeThrough')"><s>S</s></button>
                    <span style="border-left: 1px solid #4e5058; margin: 0 5px;"></span>
                    <button onclick="exec('formatBlock', 'blockquote')">"</button>
                    <button onclick="exec('formatBlock', 'h1')">H1</button>
                    <button onclick="exec('formatBlock', 'p')">P</button>
                </div>
                <div id="editor" contenteditable="true" oninput="handleInput()"></div>
                <div class="editor-footer">
                    <span id="charCount">0 / 2000</span>
                    <span>Supports Discord Markdown & Role/User Pings</span>
                </div>
            </div>

            <div style="margin-top: 20px;">
                <label class="section-label">File Attachment</label>
                <input type="file" id="fileInput">
            </div>

            <div style="margin-top: 30px; display: flex; gap: 10px;">
                <button class="btn btn-primary" id="sendBtn" style="flex: 2; padding: 15px;" onclick="send()">SEND TO DISCORD</button>
                <button class="btn btn-ghost" style="flex: 1;" onclick="clearEditor()">CLEAR ALL</button>
            </div>
        </div>
    </div>

    <div id="status-toast"></div>

    <script>
        let profiles = JSON.parse(localStorage.getItem('wh_profiles') || '[]');
        let templates = JSON.parse(localStorage.getItem('wh_templates') || '[]');
        let activeHook = '';

        window.onload = () => {
            renderProfiles();
            renderTemplates();
            document.getElementById('editor').innerHTML = localStorage.getItem('wh_draft_content') || '';
            document.getElementById('botName').value = localStorage.getItem('wh_draft_name') || '';
            document.getElementById('botAvatar').value = localStorage.getItem('wh_draft_avatar') || '';
            updateStats();
        };

        function exec(cmd, val = null) { 
            document.execCommand(cmd, false, val); 
            handleInput();
        }

        function handleInput() {
            updateStats();
            saveDraft();
        }

        function updateStats() {
            const count = document.getElementById('editor').innerText.length;
            const el = document.getElementById('charCount');
            el.innerText = `${count} / 2000`;
            el.style.color = count > 2000 ? 'var(--danger)' : 'var(--text-muted)';
        }

        function saveDraft() {
            localStorage.setItem('wh_draft_content', document.getElementById('editor').innerHTML);
            localStorage.setItem('wh_draft_name', document.getElementById('botName').value);
            localStorage.setItem('wh_draft_avatar', document.getElementById('botAvatar').value);
        }

        // Profile Logic
        function addProfile() {
            const name = prompt("Profile Name (e.g. Staff Announcements):");
            const url = prompt("Webhook URL:");
            if(name && url) {
                const linkId = document.getElementById('linkIdentity').checked;
                profiles.push({
                    name, 
                    url,
                    botName: linkId ? document.getElementById('botName').value : '',
                    botAvatar: linkId ? document.getElementById('botAvatar').value : ''
                });
                localStorage.setItem('wh_profiles', JSON.stringify(profiles));
                renderProfiles();
            }
        }

        function renderProfiles() {
            const container = document.getElementById('profileList');
            container.innerHTML = '';
            profiles.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = `chip ${activeHook === p.url ? 'active' : ''}`;
                div.innerHTML = `<span>👤 ${p.name}</span>
                    <div class="chip-actions"><span onclick="deleteProfile(${i})">×</span></div>`;
                div.onclick = () => selectProfile(p);
                container.appendChild(div);
            });
        }

        function selectProfile(p) {
            activeHook = p.url;
            document.getElementById('activeProfileName').innerText = `Profile: ${p.name}`;
            
            // Auto-load saved identity from profile if it exists
            if (p.botName) document.getElementById('botName').value = p.botName;
            if (p.botAvatar) document.getElementById('botAvatar').value = p.botAvatar;
            
            saveDraft();
            renderProfiles();
        }

        function deleteProfile(i) {
            event.stopPropagation();
            profiles.splice(i, 1);
            localStorage.setItem('wh_profiles', JSON.stringify(profiles));
            renderProfiles();
        }

        // Template Logic
        function saveAsTemplate() {
            const name = prompt("Template Name:");
            if(name) {
                templates.push({
                    name,
                    content: document.getElementById('editor').innerHTML,
                    botName: document.getElementById('botName').value,
                    botAvatar: document.getElementById('botAvatar').value
                });
                localStorage.setItem('wh_templates', JSON.stringify(templates));
                renderTemplates();
            }
        }

        function renderTemplates() {
            const container = document.getElementById('templateList');
            container.innerHTML = '';
            templates.forEach((t, i) => {
                const div = document.createElement('div');
                div.className = 'chip';
                div.innerHTML = `<span>📄 ${t.name}</span>
                    <div class="chip-actions"><span onclick="deleteTemplate(${i})">×</span></div>`;
                div.onclick = () => {
                    document.getElementById('editor').innerHTML = t.content;
                    document.getElementById('botName').value = t.botName;
                    document.getElementById('botAvatar').value = t.botAvatar;
                    handleInput();
                };
                container.appendChild(div);
            });
        }

        function deleteTemplate(i) {
            event.stopPropagation();
            templates.splice(i, 1);
            localStorage.setItem('wh_templates', JSON.stringify(templates));
            renderTemplates();
        }

        function toast(msg, type='success') {
            const t = document.getElementById('status-toast');
            t.innerText = msg;
            t.style.background = type === 'success' ? 'var(--success)' : 'var(--danger)';
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function clearEditor() {
            if(confirm("Wipe editor and local identity draft?")) {
                document.getElementById('editor').innerHTML = '';
                document.getElementById('botName').value = '';
                document.getElementById('botAvatar').value = '';
                document.getElementById('fileInput').value = '';
                handleInput();
            }
        }

        async function send() {
            if(!activeHook) return toast("Select a profile first!", "danger");
            
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.innerText = "SENDING...";

            const editor = document.getElementById('editor');
            let content = editor.innerHTML
                .replace(/<h1>(.*?)<\/h1>/g, "# $1\n")
                .replace(/<div>/g, "\n").replace(/<\/div>/g, "")
                .replace(/<br>/g, "\n")
                .replace(/<[^>]*>/g, "").trim();

            const formData = new FormData();
            const payload = { content: content };
            if(document.getElementById('botName').value) payload.username = document.getElementById('botName').value;
            if(document.getElementById('botAvatar').value) payload.avatar_url = document.getElementById('botAvatar').value;

            formData.append('payload_json', JSON.stringify(payload));
            const files = document.getElementById('fileInput').files;
            if(files.length > 0) formData.append('file', files[0]);

            try {
                const res = await fetch(activeHook, { method: 'POST', body: formData });
                if(res.ok) {
                    toast("Message sent!");
                    editor.innerHTML = '';
                    handleInput();
                } else { toast("Discord rejected the message.", "danger"); }
            } catch(e) { toast("Network error.", "danger"); }
            finally {
                btn.disabled = false;
                btn.innerText = "SEND TO DISCORD";
            }
        }
    </script>
</body>
</html>
