<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webhook Commander Pro</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/5968/5968756.png">
    <style>
        :root {
            --bg-darker: #1e1f22;
            --bg-sidebar: #2b2d31;
            --bg-main: #313338;
            --bg-card: #383a40;
            --text-white: #ffffff;
            --text-normal: #dbdee1;
            --text-muted: #949ba4;
            --blurple: #5865f2;
            --blurple-hover: #4752c4;
            --danger: #fa777c;
            --success: #23a559;
            --border: rgba(0,0,0,0.2);
            --discord-bot-tag: #5865f2;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'gg sans', 'Helvetica Neue', Arial, sans-serif; 
            background-color: var(--bg-darker); color: var(--text-normal);
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        /* Sidebar */
        .sidebar { width: 280px; background: var(--bg-sidebar); display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 15px; }
        .section-label { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; display: block; }

        /* Main Workspace */
        .main { flex: 1; background: var(--bg-main); display: flex; flex-direction: column; overflow-y: auto; }
        .workspace { max-width: 900px; width: 100%; margin: 0 auto; padding: 30px 20px; }

        /* Card Styles */
        .card { background: var(--bg-card); border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        input[type="text"] { width: 100%; background: var(--bg-darker); border: 1px solid transparent; color: white; padding: 10px; border-radius: 4px; outline: none; margin-bottom: 8px; }
        input:focus { border-color: var(--blurple); }

        /* List Items */
        .chip { background: var(--bg-darker); padding: 8px 12px; border-radius: 4px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .chip:hover { background: #404249; }
        .chip.active { border-left: 4px solid var(--blurple); background: #404249; }
        .chip-actions { display: none; }
        .chip:hover .chip-actions { display: block; color: var(--danger); font-weight: bold; }

        /* Editor */
        .editor-wrap { background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
        .toolbar { background: #2b2d31; padding: 8px; display: flex; gap: 5px; border-bottom: 1px solid var(--border); }
        .toolbar button { background: transparent; border: none; color: var(--text-normal); padding: 5px 10px; border-radius: 3px; cursor: pointer; }
        .toolbar button:hover { background: #4e5058; color: white; }
        #editor { min-height: 180px; padding: 20px; outline: none; line-height: 1.6; background: #383a40; }

        /* Discord Preview UI */
        .preview-area { margin-top: 25px; padding-top: 20px; border-top: 1px solid var(--border); }
        .discord-msg { display: flex; gap: 16px; padding: 5px 0; }
        .discord-avatar { width: 40px; height: 40px; border-radius: 50%; background: #5865f2; flex-shrink: 0; background-size: cover; background-position: center; }
        .discord-content { flex: 1; }
        .discord-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .discord-name { font-weight: 500; color: white; font-size: 1rem; cursor: pointer; }
        .discord-name:hover { text-decoration: underline; }
        .discord-bot-tag { background: var(--discord-bot-tag); color: white; font-size: 10px; padding: 1px 4px; border-radius: 3px; font-weight: bold; text-transform: uppercase; }
        .discord-time { color: var(--text-muted); font-size: 12px; }
        .discord-body { color: #dbdee1; font-size: 1rem; white-space: pre-wrap; word-wrap: break-word; }

        /* Inline Formatting for Preview */
        .preview-body b, .preview-body strong { color: white; }
        .preview-body .spoiler { background: #1e1f22; color: #1e1f22; border-radius: 3px; cursor: pointer; }
        .preview-body .spoiler:hover { background: #2b2d31; }
        .preview-body .spoiler.revealed { background: rgba(255,255,255,0.1); color: inherit; }
        .preview-body blockquote { border-left: 4px solid #4e5058; padding-left: 10px; margin: 5px 0; }
        .preview-body code { background: #2b2d31; padding: 2px 4px; border-radius: 4px; font-family: monospace; font-size: 85%; }

        /* Buttons */
        .btn { cursor: pointer; border: none; border-radius: 4px; padding: 12px 20px; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: var(--blurple); color: white; width: 100%; }
        .btn-primary:hover { background: var(--blurple-hover); }

        #status-toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 4px; color: white; opacity: 0; transition: 0.3s; z-index: 100; }
        #status-toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header"><h3 style="margin:0; color:white;">Commander</h3></div>
        <div class="sidebar-content">
            <span class="section-label">Profiles</span>
            <div id="profileList"></div>
            <button class="btn" style="background:transparent; color:var(--text-muted); border:1px dashed #4e5058; width:100%; margin-top:10px;" onclick="addProfile()">+ New Profile</button>
            
            <div style="margin-top: 30px;">
                <span class="section-label">Templates</span>
                <div id="templateList"></div>
            </div>
        </div>
    </div>

    <div class="main">
        <div class="workspace">
            <div class="card">
                <span class="section-label">Identity</span>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <input type="text" id="botName" placeholder="Bot Display Name" oninput="updatePreview()">
                    <input type="text" id="botAvatar" placeholder="Avatar URL" oninput="updatePreview()">
                </div>
            </div>

            <div class="editor-wrap">
                <div class="toolbar">
                    <button onclick="exec('bold')"><b>B</b></button>
                    <button onclick="exec('italic')"><i>I</i></button>
                    <button onclick="exec('underline')"><u>U</u></button>
                    <button onclick="applySpoiler()">||</button>
                    <button onclick="exec('formatBlock', 'blockquote')">Quote</button>
                </div>
                <div id="editor" contenteditable="true" oninput="updatePreview()"></div>
            </div>

            <div class="preview-area">
                <span class="section-label">Live Discord Preview</span>
                <div class="discord-msg">
                    <div class="discord-avatar" id="prevAvatar"></div>
                    <div class="discord-content">
                        <div class="discord-header">
                            <span class="discord-name" id="prevName">Webhook Bot</span>
                            <span class="discord-bot-tag">Bot</span>
                            <span class="discord-time">Today at 12:00 PM</span>
                        </div>
                        <div class="discord-body" id="prevBody">Your message will appear here...</div>
                    </div>
                </div>
            </div>

            <div style="margin-top: 30px; display:flex; gap:10px;">
                <button class="btn btn-primary" onclick="send()">Send Message</button>
                <button class="btn" style="background:#4e5058; color:white;" onclick="saveAsTemplate()">Save Template</button>
            </div>
        </div>
    </div>

    <div id="status-toast"></div>

    <script>
        let profiles = JSON.parse(localStorage.getItem('wh_profiles') || '[]');
        let templates = JSON.parse(localStorage.getItem('wh_templates') || '[]');
        let activeHook = '';

        window.onload = () => {
            renderProfiles();
            renderTemplates();
            updatePreview();
        };

        function exec(cmd) { document.execCommand(cmd, false, null); updatePreview(); }

        function applySpoiler() {
            const sel = window.getSelection();
            const span = document.createElement("span");
            span.className = "spoiler";
            span.onclick = function() { this.classList.toggle('revealed'); };
            span.textContent = sel.toString() || "spoiler";
            const range = sel.getRangeAt(0);
            range.deleteContents();
            range.insertNode(span);
            updatePreview();
        }

        function updatePreview() {
            const name = document.getElementById('botName').value || 'Webhook Bot';
            const avatar = document.getElementById('botAvatar').value || 'https://cdn.discordapp.com/embed/avatars/0.png';
            const editorHtml = document.getElementById('editor').innerHTML;

            document.getElementById('prevName').innerText = name;
            document.getElementById('prevAvatar').style.backgroundImage = `url('${avatar}')`;
            
            // Minimal clean preview render
            let cleanBody = editorHtml
                .replace(/<div>/g, "\n").replace(/<\/div>/g, "")
                .replace(/<br>/g, "\n");
            
            document.getElementById('prevBody').innerHTML = cleanBody || '<span style="color:var(--text-muted)">Type something...</span>';
            
            localStorage.setItem('wh_draft_content', editorHtml);
            localStorage.setItem('wh_draft_name', name);
            localStorage.setItem('wh_draft_avatar', avatar);
        }

        function addProfile() {
            const name = prompt("Profile Name:");
            const url = prompt("Webhook URL:");
            if(name && url) {
                profiles.push({name, url, botName: document.getElementById('botName').value, botAvatar: document.getElementById('botAvatar').value});
                localStorage.setItem('wh_profiles', JSON.stringify(profiles));
                renderProfiles();
            }
        }

        function renderProfiles() {
            const list = document.getElementById('profileList');
            list.innerHTML = '';
            profiles.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = `chip ${activeHook === p.url ? 'active' : ''}`;
                div.innerHTML = `<span>👤 ${p.name}</span><span class="chip-actions" onclick="deleteProfile(${i})">×</span>`;
                div.onclick = () => {
                    activeHook = p.url;
                    if(p.botName) document.getElementById('botName').value = p.botName;
                    if(p.botAvatar) document.getElementById('botAvatar').value = p.botAvatar;
                    renderProfiles();
                    updatePreview();
                };
                list.appendChild(div);
            });
        }

        function deleteProfile(i) {
            event.stopPropagation();
            profiles.splice(i, 1);
            localStorage.setItem('wh_profiles', JSON.stringify(profiles));
            renderProfiles();
        }

        function saveAsTemplate() {
            const name = prompt("Template Name:");
            if(name) {
                templates.push({name, content: document.getElementById('editor').innerHTML});
                localStorage.setItem('wh_templates', JSON.stringify(templates));
                renderTemplates();
            }
        }

        function renderTemplates() {
            const list = document.getElementById('templateList');
            list.innerHTML = '';
            templates.forEach((t, i) => {
                const div = document.createElement('div');
                div.className = 'chip';
                div.innerHTML = `<span>📄 ${t.name}</span>`;
                div.onclick = () => {
                    document.getElementById('editor').innerHTML = t.content;
                    updatePreview();
                };
                list.appendChild(div);
            });
        }

        function toast(msg, success = true) {
            const t = document.getElementById('status-toast');
            t.innerText = msg;
            t.style.background = success ? 'var(--success)' : 'var(--danger)';
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        async function send() {
            if(!activeHook) return toast("Select a profile first!", false);
            
            const name = document.getElementById('botName').value;
            const avatar = document.getElementById('botAvatar').value;
            let content = document.getElementById('editor').innerHTML
                .replace(/<b>(.*?)<\/b>/g, "**$1**")
                .replace(/<i>(.*?)<\/i>/g, "*$1*")
                .replace(/<u>(.*?)<\/u>/g, "__$1__")
                .replace(/<span class="spoiler"[^>]*>(.*?)<\/span>/g, "||$1||")
                .replace(/<blockquote>(.*?)<\/blockquote>/g, "> $1\n")
                .replace(/<div>/g, "\n").replace(/<\/div>/g, "")
                .replace(/<br>/g, "\n")
                .replace(/<[^>]*>/g, "").trim();

            try {
                const res = await fetch(activeHook, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({content, username: name, avatar_url: avatar})
                });
                if(res.ok) toast("Sent successfully!");
                else toast("Error sending message.", false);
            } catch(e) { toast("Connection error.", false); }
        }
    </script>
</body>
</html>
