<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webhook Commander Pro</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/5968/5968756.png">
    <style>
        :root {
            --bg-darkest: #111214;
            --bg-sidebar: #1e1f22;
            --bg-main: #313338;
            --bg-card: #2b2d31;
            --bg-input: #1e1f22;
            --text-normal: #dbdee1;
            --text-muted: #949ba4;
            --blurple: #5865f2;
            --blurple-hover: #4752c4;
            --danger: #fa777c;
            --success: #23a559;
            --border: rgba(0,0,0,0.3);
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; scrollbar-width: thin; scrollbar-color: var(--bg-sidebar) transparent; }
        body { 
            font-family: 'gg sans', 'Noto Sans', sans-serif; 
            background-color: var(--bg-darkest); color: var(--text-normal);
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        /* Sidebar */
        .sidebar { 
            width: 72px; background: var(--bg-sidebar); display: flex; flex-direction: column; 
            align-items: center; padding: 12px 0; gap: 12px; border-right: 1px solid var(--border);
            overflow-y: auto; z-index: 10;
        }
        .profile-icon {
            width: 48px; height: 48px; border-radius: 50%; background: var(--bg-main);
            cursor: pointer; transition: var(--transition); background-size: cover; background-position: center;
            border: 2px solid transparent; position: relative;
        }
        .profile-icon:hover { border-radius: 30%; border-color: var(--blurple); }
        .profile-icon::after {
            content: attr(data-name); position: absolute; left: 70px; top: 50%;
            transform: translateY(-50%); background: #000; color: #fff;
            padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 600;
            white-space: nowrap; opacity: 0; pointer-events: none; transition: var(--transition);
        }
        .profile-icon:hover::after { opacity: 1; left: 80px; }

        .save-btn {
            width: 48px; height: 48px; border-radius: 50%; background: var(--bg-card);
            display: flex; align-items: center; justify-content: center; font-size: 24px;
            color: var(--success); cursor: pointer; transition: var(--transition); border: 1px solid var(--border);
        }
        .save-btn:hover { background: var(--success); color: white; border-radius: 30%; }

        /* Main Viewport */
        .main { flex: 1; background: var(--bg-main); overflow-y: auto; padding: 40px 20px; }
        .workspace { max-width: 850px; margin: 0 auto; }

        .card { background: var(--bg-card); border-radius: 12px; padding: 24px; margin-bottom: 24px; border: 1px solid var(--border); }
        .section-label { font-size: 12px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 12px; display: block; letter-spacing: 0.5px; }
        
        input[type="text"], input[type="url"], textarea { 
            width: 100%; background: var(--bg-input); border: 1px solid transparent; color: white;
            padding: 12px; border-radius: 6px; outline: none; margin-bottom: 16px; font-size: 14px;
        }
        input:focus { border-color: var(--blurple); }

        /* Toggle Switch */
        .toggle-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; cursor: pointer; width: fit-content; }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #4e5058; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* Editor */
        .editor-wrap { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: var(--bg-card); margin-bottom: 24px; }
        .toolbar { background: #232428; padding: 10px; display: flex; gap: 8px; border-bottom: 1px solid var(--border); }
        .toolbar button { background: transparent; border: none; color: var(--text-normal); cursor: pointer; font-weight: bold; padding: 4px 8px; border-radius: 4px; }
        .toolbar button:hover { background: #4e5058; }
        #editor { min-height: 180px; padding: 20px; outline: none; line-height: 1.6; }

        /* Discord Preview */
        .preview-container { background: #2b2d31; padding: 20px; border-radius: 8px; display: flex; gap: 16px; border: 1px solid var(--border); }
        .prev-pfp { width: 40px; height: 40px; border-radius: 50%; background: var(--blurple); flex-shrink: 0; background-size: cover; }
        .prev-name { font-weight: 600; color: white; margin-right: 4px; }
        .prev-tag { background: var(--blurple); font-size: 10px; padding: 1px 4px; border-radius: 3px; color: white; font-weight: bold; text-transform: uppercase; }
        
        .embed-preview { 
            margin-top: 8px; padding: 12px; background: #232428; border-radius: 4px; 
            border-left: 4px solid var(--blurple); max-width: 520px; display: none;
        }
        .embed-title { color: #00a8fc; font-weight: 700; font-size: 16px; margin-bottom: 4px; }
        .embed-desc { font-size: 14px; color: #dbdee1; white-space: pre-wrap; }

        .btn-send { 
            width: 100%; padding: 20px; border-radius: 12px; border: none; font-weight: 800; 
            cursor: pointer; transition: var(--transition); background: var(--blurple); color: white; font-size: 18px;
        }
        .btn-send:hover { background: var(--blurple-hover); transform: translateY(-2px); }

        #toast { position: fixed; bottom: 30px; right: 30px; padding: 14px 24px; border-radius: 8px; color: white; font-weight: bold; transform: translateX(200%); transition: 0.4s; z-index: 1000; }
        #toast.show { transform: translateX(0); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="save-btn" onclick="saveToVault()" title="Save Profile">+</div>
        <div style="width: 32px; height: 1px; background: #4e5058; margin: 8px 0;"></div>
        <div id="profileIcons"></div>
    </div>

    <div class="main">
        <div class="workspace">
            <div class="card">
                <span class="section-label">Target Hook</span>
                <input type="text" id="webhookUrl" placeholder="https://discord.com/api/webhooks/...">
                
                <div style="display: flex; gap: 15px;">
                    <div style="flex: 1;">
                        <span class="section-label">Identity Name</span>
                        <input type="text" id="botName" placeholder="Bot Name" oninput="updateUI()">
                    </div>
                    <div style="flex: 1;">
                        <span class="section-label">Avatar URL</span>
                        <input type="text" id="botAvatar" placeholder="Image link..." oninput="updateUI()">
                    </div>
                </div>
            </div>

            <div class="card">
                <label class="toggle-wrap">
                    <div class="switch">
                        <input type="checkbox" id="useEmbed" onchange="toggleEmbed()">
                        <span class="slider"></span>
                    </div>
                    <span class="section-label" style="margin:0">Enable Rich Embed</span>
                </label>

                <div id="embedControls" style="display:none; border-top: 1px solid #4e5058; padding-top: 20px;">
                    <div style="display: flex; gap: 15px;">
                        <div style="flex: 2;">
                            <span class="section-label">Embed Title</span>
                            <input type="text" id="embedTitle" placeholder="The headline..." oninput="updateUI()">
                        </div>
                        <div style="flex: 1;">
                            <span class="section-label">Accent Color</span>
                            <input type="color" id="embedColor" value="#5865f2" oninput="updateUI()" style="height:42px; padding:4px; cursor:pointer;">
                        </div>
                    </div>
                </div>
            </div>

            <div class="editor-wrap">
                <div class="toolbar">
                    <button onclick="exec('bold')">B</button>
                    <button onclick="exec('italic')">I</button>
                    <button onclick="exec('underline')">U</button>
                    <button onclick="exec('strikeThrough')">S</button>
                </div>
                <div id="editor" contenteditable="true" oninput="updateUI()" placeholder="Main content goes here..."></div>
            </div>

            <span class="section-label">Live Preview</span>
            <div class="preview-container">
                <div class="prev-pfp" id="prevPfp"></div>
                <div style="flex:1">
                    <div><span class="prev-name" id="prevName">Webhook</span><span class="prev-tag">APP</span></div>
                    <div id="prevBody" style="margin-top: 4px; white-space: pre-wrap;"></div>
                    
                    <div id="prevEmbed" class="embed-preview">
                        <div id="prevEmbedTitle" class="embed-title"></div>
                        <div id="prevEmbedDesc" class="embed-desc"></div>
                    </div>
                </div>
            </div>

            <button class="btn-send" id="sendBtn" onclick="send()" style="margin-top: 30px;">DISPATCH TO DISCORD</button>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        let profiles = JSON.parse(localStorage.getItem('wh_vault_pro_v3') || '[]');

        function toggleEmbed() {
            const isEnabled = document.getElementById('useEmbed').checked;
            document.getElementById('embedControls').style.display = isEnabled ? 'block' : 'none';
            document.getElementById('prevEmbed').style.display = isEnabled ? 'block' : 'none';
            updateUI();
        }

        function updateUI() {
            const name = document.getElementById('botName').value || 'Webhook';
            const pfp = document.getElementById('botAvatar').value || 'https://cdn.discordapp.com/embed/avatars/0.png';
            const editorContent = document.getElementById('editor').innerHTML;
            
            document.getElementById('prevName').innerText = name;
            document.getElementById('prevPfp').style.backgroundImage = `url('${pfp}')`;

            if (document.getElementById('useEmbed').checked) {
                document.getElementById('prevBody').innerHTML = ''; // Clear main body if embedding
                document.getElementById('prevEmbedTitle').innerText = document.getElementById('embedTitle').value;
                document.getElementById('prevEmbedDesc').innerHTML = editorContent;
                document.getElementById('prevEmbed').style.borderColor = document.getElementById('embedColor').value;
            } else {
                document.getElementById('prevBody').innerHTML = editorContent || '<span style="color:var(--text-muted)">...</span>';
            }
        }

        function exec(cmd) { document.execCommand(cmd, false, null); updateUI(); }

        function saveToVault() {
            const url = document.getElementById('webhookUrl').value;
            if(!url) return showToast("Nothing to save!", false);
            profiles.push({ url, name: document.getElementById('botName').value, pfp: document.getElementById('botAvatar').value });
            localStorage.setItem('wh_vault_pro_v3', JSON.stringify(profiles));
            renderSidebar();
            showToast("Profile Saved!");
        }

        function renderSidebar() {
            const container = document.getElementById('profileIcons');
            container.innerHTML = '';
            profiles.forEach((p, i) => {
                const icon = document.createElement('div');
                icon.className = 'profile-icon';
                icon.style.backgroundImage = `url('${p.pfp || 'https://cdn.discordapp.com/embed/avatars/1.png'}')`;
                icon.setAttribute('data-name', p.name || 'Unnamed');
                icon.onclick = () => {
                    document.getElementById('webhookUrl').value = p.url;
                    document.getElementById('botName').value = p.name;
                    document.getElementById('botAvatar').value = p.pfp;
                    updateUI();
                };
                container.appendChild(icon);
            });
        }

        function showToast(msg, success = true) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.background = success ? 'var(--success)' : 'var(--danger)';
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        async function send() {
            const url = document.getElementById('webhookUrl').value;
            if(!url) return showToast("Missing URL!", false);

            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.innerText = "SENDING...";

            // Convert HTML to Discord Markdown
            let markdown = document.getElementById('editor').innerHTML
                .replace(/<b>(.*?)<\/b>/g, "**$1**")
                .replace(/<i>(.*?)<\/i>/g, "*$1*")
                .replace(/<u>(.*?)<\/u>/g, "__$1__")
                .replace(/<s>(.*?)<\/s>/g, "~~$1~~")
                .replace(/<div>/g, "\n").replace(/<\/div>/g, "")
                .replace(/<br>/g, "\n")
                .replace(/&nbsp;/g, " ")
                .replace(/<[^>]*>/g, "").trim();

            const isEmbed = document.getElementById('useEmbed').checked;
            const payload = {
                username: document.getElementById('botName').value || undefined,
                avatar_url: document.getElementById('botAvatar').value || undefined
            };

            if (isEmbed) {
                payload.embeds = [{
                    title: document.getElementById('embedTitle').value || undefined,
                    description: markdown || undefined,
                    color: parseInt(document.getElementById('embedColor').value.replace('#', ''), 16)
                }];
            } else {
                payload.content = markdown || undefined;
            }

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if(res.ok) showToast("Message Sent!");
                else showToast("Discord Error", false);
            } catch(e) {
                showToast("Connection Failed", false);
            } finally {
                btn.disabled = false;
                btn.innerText = "DISPATCH TO DISCORD";
            }
        }

        window.onload = renderSidebar;
    </script>
</body>
</html>
