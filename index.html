<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Webhook Portal</title>
    <link rel="icon" type="image/png" href="http://googleusercontent.com/image_collection/image_retrieval/7253782008077221742_0">
    <style>
        :root {
            --bg-main: #313338;
            --bg-card: #2b2d31;
            --bg-input: #1e1f22;
            --bg-editor: #383a40;
            --text-main: #dbdee1;
            --text-muted: #949ba4;
            --discord-blurple: #5865f2;
            --discord-hover: #4752c4;
        }

        body {
            font-family: 'gg sans', 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: var(--bg-card);
            padding: 32px;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        label { display: block; font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; color: var(--text-muted); letter-spacing: 0.5px; }

        input[type="text"] {
            width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 4px;
            border: 1px solid transparent; background: var(--bg-input); color: white; box-sizing: border-box; outline: none; transition: border 0.2s;
        }
        input[type="text"]:focus { border-color: var(--discord-blurple); }

        .toolbar {
            display: flex; gap: 8px; background: #232428; padding: 10px;
            border-radius: 8px 8px 0 0; align-items: center; flex-wrap: wrap;
        }

        .toolbar button, .toolbar select {
            background: #4e5058; color: white; border: none; padding: 6px 12px;
            border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500;
        }

        .toolbar button:hover { background: #6d6f78; }

        #editor { 
            min-height: 160px; background: var(--bg-editor); padding: 16px;
            border-radius: 0 0 8px 8px; outline: none; line-height: 1.6;
            margin-bottom: 24px; font-size: 15px; border: 1px solid transparent;
            overflow-y: auto;
        }

        .send-btn {
            background: var(--discord-blurple); color: white; width: 100%;
            border: none; padding: 16px; border-radius: 4px; font-weight: bold;
            cursor: pointer; font-size: 16px; transition: all 0.2s ease;
        }

        .send-btn:hover { background: var(--discord-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(88, 101, 242, 0.4); }

        .guide {
            display: flex; justify-content: space-between; margin-top: -15px; margin-bottom: 20px;
            font-size: 11px; color: var(--text-muted);
        }

        /* Editor Preview Styles */
        h1 { font-size: 1.8em; margin: 0.2em 0; border-bottom: 1px solid #4e5058; }
        h2 { font-size: 1.4em; margin: 0.2em 0; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:white; margin-top:0; margin-bottom: 20px;">Webhook Portal</h2>
    
    <label>Webhook URL</label>
    <input type="text" id="webhookUrl" placeholder="https://discord.com/api/webhooks/...">
    
    <label>Message Content</label>
    <div class="toolbar">
        <button title="Bold" onclick="exec('bold')"><b>B</b></button>
        <button title="Italic" onclick="exec('italic')"><i>I</i></button>
        <button title="Underline" onclick="exec('underline')"><u>U</u></button>
        <button title="Strikethrough" onclick="exec('strikeThrough')"><s>S</s></button>
        
        <select title="Text Size" onchange="exec('formatBlock', this.value); this.selectedIndex=0;">
            <option value="">Size</option>
            <option value="h1">Big</option>
            <option value="h2">Medium</option>
            <option value="p">Small</option>
        </select>
    </div>
    
    <div id="editor" contenteditable="true"></div>
    
    <div class="guide">
        <span><b>User Ping:</b> @@ID@@</span>
        <span><b>Role Ping:</b> @ID@</span>
    </div>

    <button class="send-btn" onclick="sendToDiscord()">Send to Discord</button>
</div>

<script>
    function exec(cmd, val = null) {
        document.execCommand(cmd, false, val);
    }

    async function sendToDiscord() {
        const url = document.getElementById('webhookUrl').value;
        const editor = document.getElementById('editor');

        let content = editor.innerHTML
            // Headers (Big/Medium)
            .replace(/<h1>(.*?)<\/h1>/g, "# $1\n")
            .replace(/<h2>(.*?)<\/h2>/g, "## $1\n")
            // Formatting
            .replace(/<b>(.*?)<\/b>|<strong>(.*?)<\/strong>/g, "**$1$2**")
            .replace(/<i>(.*?)<\/i>|<em>(.*?)<\/em>/g, "*$1$2*")
            .replace(/<u>(.*?)<\/u>/g, "__$1__")
            .replace(/<s>(.*?)<\/s>|<strike>(.*?)<\/strike>/g, "~~$1$2~~")
            
            // --- NEW PING LOGIC ---
            // User Ping: @@ID@@ -> <@ID>
            .replace(/@@(\d+)@@/g, "<@$1>")
            // Role Ping: @ID@ -> <@&ID>
            .replace(/@(\d+)@/g, "<@&$1>")
            
            // Cleanup
            .replace(/<div>/g, "\n").replace(/<\/div>/g, "")
            .replace(/<br>/g, "\n")
            .replace(/&nbsp;/g, " ")
            .replace(/<[^>]*>/g, ""); 

        if (!url || !content.trim()) return alert("Please fill in the URL and Message.");

        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: content })
            });
            if (res.ok) { 
                alert("Success!"); 
                editor.innerHTML = ""; 
            } else { 
                alert("Error: Webhook refused the message."); 
            }
        } catch (e) { 
            alert("Connection error."); 
        }
    }
</script>

</body>
</html>
