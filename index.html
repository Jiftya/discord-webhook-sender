<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Webhook Portal</title>
    <link rel="icon" type="image/png" href="http://googleusercontent.com/image_collection/image_retrieval/7253782008077221742_0">
    <style>
        :root {
            --bg-main: #313338;
            --bg-card: #2b2d31;
            --bg-input: #1e1f22;
            --bg-editor: #383a40;
            --text-main: #dbdee1;
            --text-muted: #949ba4;
            --discord-blurple: #5865f2;
            --discord-hover: #4752c4;
            --success: #23a559;
            --danger: #da373c;
        }

        body { font-family: 'gg sans', sans-serif; background-color: var(--bg-main); color: var(--text-main); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 750px; display: flex; flex-direction: column; gap: 20px; }
        .card { background: var(--bg-card); padding: 24px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        
        h3 { margin-top: 0; color: white; font-size: 18px; display: flex; justify-content: space-between; align-items: center; }
        label { display: block; font-size: 11px; font-weight: bold; text-transform: uppercase; margin: 10px 0 5px 0; color: var(--text-muted); }

        input[type="text"], input[type="file"] {
            width: 100%; padding: 12px; border-radius: 4px; border: 1px solid transparent; 
            background: var(--bg-input); color: white; box-sizing: border-box; outline: none;
        }
        input:focus { border-color: var(--discord-blurple); }

        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        .webhook-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; border-top: 1px solid #3f4147; padding-top: 15px; }
        .webhook-chip { background: #4e5058; padding: 6px 12px; border-radius: 15px; font-size: 12px; cursor: pointer; transition: 0.2s; }
        .webhook-chip:hover { background: var(--discord-blurple); }

        .switch-container { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-muted); }
        .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #4e5058; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(14px); }

        .toolbar { display: flex; gap: 6px; background: #232428; padding: 10px; border-radius: 8px 8px 0 0; flex-wrap: wrap; }
        .toolbar button, .toolbar select { background: #4e5058; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .toolbar button:hover { background: #6d6f78; }
        
        #editor { min-height: 160px; background: var(--bg-editor); padding: 16px; border-radius: 0 0 8px 8px; outline: none; line-height: 1.6; border: 1px solid transparent; overflow-y: auto; }
        
        /* Editor Style Visuals */
        blockquote { border-left: 4px solid #4e5058; padding-left: 10px; margin: 5px 0; color: #b5bac1; }
        code { background: #2b2d31; padding: 2px 4px; border-radius: 4px; font-family: monospace; }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .send-btn { background: var(--discord-blurple); color: white; flex: 3; border: none; padding: 16px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .clear-btn { background: #4e5058; color: white; flex: 1; border: none; padding: 16px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .send-btn:hover { background: var(--discord-hover); }
        .clear-btn:hover { background: #6d6f78; }

        #status { text-align: center; font-size: 12px; margin-top: 10px; height: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3>🔗 Saved Channels</h3>
        <div class="row">
            <input type="text" id="nickName" placeholder="Channel Name">
            <input type="text" id="webhookUrl" placeholder="Webhook URL">
            <button onclick="saveWebhook()" style="background: var(--discord-blurple); color: white; border: none; padding: 0 15px; border-radius: 4px; cursor: pointer; font-weight: bold;">Save</button>
        </div>
        <div class="webhook-list" id="webhookList"></div>
    </div>

    <div class="card">
        <h3>
            🎭 Bot Identity
            <div class="switch-container">
                <span>Remember Identity</span>
                <label class="switch"><input type="checkbox" id="saveIdentityToggle" onchange="toggleIdentityStorage()"><span class="slider"></span></label>
            </div>
        </h3>
        <div class="row">
            <div style="flex: 1;"><label>Bot Name</label><input type="text" id="overrideName" placeholder="Display Name" oninput="handleIdentityInput()"></div>
            <div style="flex: 1;"><label>Avatar URL</label><input type="text" id="overrideAvatar" placeholder="https://..." oninput="handleIdentityInput()"></div>
        </div>
    </div>

    <div class="card">
        <h3>📝 Message</h3>
        <div class="toolbar">
            <button title="Bold" onclick="exec('bold')"><b>B</b></button>
            <button title="Italic" onclick="exec('italic')"><i>I</i></button>
            <button title="Underline" onclick="exec('underline')"><u>U</u></button>
            <button title="Strikethrough" onclick="exec('strikeThrough')"><s>S</s></button>
            <button title="Blockquote" onclick="exec('formatBlock', 'blockquote')"><b>&ldquo;</b></button>
            <button title="Inline Code" onclick="applyCode()"><b>&lt;/&gt;</b></button>
            <select onchange="exec('formatBlock', this.value); this.selectedIndex=0;">
                <option value="">Text Size</option>
                <option value="h1">Big Header</option>
                <option value="h2">Medium Header</option>
                <option value="p">Normal Text</option>
            </select>
        </div>
        <div id="editor" contenteditable="true"></div>
        
        <label>Attachment</label>
        <input type="file" id="fileInput">

        <div class="btn-group">
            <button class="clear-btn" onclick="confirmClear()">Clear All</button>
            <button class="send-btn" id="sendBtn" onclick="sendToDiscord()">Send Message</button>
        </div>
        <div id="status"></div>
    </div>
</div>

<script>
    let savedHooks = JSON.parse(localStorage.getItem('discordHooks') || '[]');
    
    window.onload = () => {
        const shouldSave = localStorage.getItem('saveIdentity') === 'true';
        document.getElementById('saveIdentityToggle').checked = shouldSave;
        if (shouldSave) {
            document.getElementById('overrideName').value = localStorage.getItem('stickyName') || '';
            document.getElementById('overrideAvatar').value = localStorage.getItem('stickyAvatar') || '';
        }
        renderHooks();
    };

    function exec(cmd, val = null) { document.execCommand(cmd, false, val); }

    function applyCode() {
        const selection = window.getSelection();
        if (!selection.rangeCount) return;
        const span = document.createElement("code");
        span.textContent = selection.toString() || "code";
        const range = selection.getRangeAt(0);
        range.deleteContents();
        range.insertNode(span);
    }

    function toggleIdentityStorage() {
        const isChecked = document.getElementById('saveIdentityToggle').checked;
        localStorage.setItem('saveIdentity', isChecked);
        if (isChecked) handleIdentityInput();
        else { localStorage.removeItem('stickyName'); localStorage.removeItem('stickyAvatar'); }
    }

    function handleIdentityInput() {
        if (document.getElementById('saveIdentityToggle').checked) {
            localStorage.setItem('stickyName', document.getElementById('overrideName').value);
            localStorage.setItem('stickyAvatar', document.getElementById('overrideAvatar').value);
        }
    }

    function renderHooks() {
        const list = document.getElementById('webhookList');
        list.innerHTML = '';
        savedHooks.forEach((hook, index) => {
            const chip = document.createElement('div');
            chip.className = 'webhook-chip';
            chip.innerHTML = `<span onclick="document.getElementById('webhookUrl').value='${hook.url}'">${hook.name}</span> <span onclick="deleteHook(${index})" style="margin-left:5px; opacity:0.5">×</span>`;
            list.appendChild(chip);
        });
    }

    function saveWebhook() {
        const name = document.getElementById('nickName').value;
        const url = document.getElementById('webhookUrl').value;
        if (name && url) {
            savedHooks.push({ name, url });
            localStorage.setItem('discordHooks', JSON.stringify(savedHooks));
            renderHooks();
            document.getElementById('nickName').value = '';
            document.getElementById('webhookUrl').value = '';
        }
    }

    function deleteHook(index) {
        savedHooks.splice(index, 1);
        localStorage.setItem('discordHooks', JSON.stringify(savedHooks));
        renderHooks();
    }

    function confirmClear() {
        if(confirm("Wipe the message and current identity settings?")) {
            document.getElementById('editor').innerHTML = "";
            document.getElementById('fileInput').value = "";
            document.getElementById('overrideName').value = "";
            document.getElementById('overrideAvatar').value = "";
            localStorage.removeItem('stickyName');
            localStorage.removeItem('stickyAvatar');
        }
    }

    async function sendToDiscord() {
        const url = document.getElementById('webhookUrl').value;
        const editor = document.getElementById('editor');
        const fileInput = document.getElementById('fileInput');
        const ovName = document.getElementById('overrideName').value;
        const ovAvatar = document.getElementById('overrideAvatar').value;
        const btn = document.getElementById('sendBtn');
        const status = document.getElementById('status');

        let content = editor.innerHTML
            .replace(/<h1>(.*?)<\/h1>/g, "# $1\n")
            .replace(/<h2>(.*?)<\/h2>/g, "## $1\n")
            .replace(/<blockquote>(.*?)<\/blockquote>/g, "> $1\n")
            .replace(/<b>(.*?)<\/b>|<strong>(.*?)<\/strong>/g, "**$1$2**")
            .replace(/<i>(.*?)<\/i>|<em>(.*?)<\/em>/g, "*$1$2*")
            .replace(/<u>(.*?)<\/u>/g, "__$1__")
            .replace(/<s>(.*?)<\/s>|<strike>(.*?)<\/strike>/g, "~~$1$2~~")
            .replace(/<code>(.*?)<\/code>/g, "`$1`")
            .replace(/@@(\d+)@@/g, "<@$1>")
            .replace(/@(\d+)@/g, "<@&$1>")
            .replace(/<div>/g, "\n").replace(/<\/div>/g, "")
            .replace(/<br>/g, "\n")
            .replace(/&nbsp;/g, " ")
            .replace(/<[^>]*>/g, ""); 

        if (!url || (!content.trim() && !fileInput.files.length)) return alert("Select a channel and add content!");

        btn.disabled = true;
        status.innerText = "⏳ Sending...";
        const formData = new FormData();
        const payload = { content: content };
        if (ovName) payload.username = ovName;
        if (ovAvatar) payload.avatar_url = ovAvatar;

        formData.append('payload_json', JSON.stringify(payload));
        if (fileInput.files.length > 0) formData.append('file', fileInput.files[0]);

        try {
            const res = await fetch(url, { method: 'POST', body: formData });
            if (res.ok) { 
                editor.innerHTML = ""; fileInput.value = ""; 
                status.innerText = "✅ Success!";
                status.style.color = "var(--success)";
                setTimeout(() => status.innerText = "", 3000);
            } else { status.innerText = "❌ Failed."; status.style.color = "var(--danger)"; }
        } catch (e) { status.innerText = "❌ Connection Error."; }
        finally { btn.disabled = false; }
    }
</script>
</body>
</html>
