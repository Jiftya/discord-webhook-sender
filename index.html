<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Webhook Portal</title>
    <link rel="icon" type="image/png" href="http://googleusercontent.com/image_collection/image_retrieval/7253782008077221742_0">
    <style>
        :root {
            --bg-main: #313338;
            --bg-card: #2b2d31;
            --bg-input: #1e1f22;
            --bg-editor: #383a40;
            --text-main: #dbdee1;
            --text-muted: #949ba4;
            --discord-blurple: #5865f2;
            --discord-hover: #4752c4;
        }

        body {
            font-family: 'gg sans', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .container { width: 100%; max-width: 700px; display: flex; flex-direction: column; gap: 20px; }
        
        .card {
            background: var(--bg-card);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        h3 { margin-top: 0; color: white; font-size: 18px; }
        label { display: block; font-size: 11px; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; color: var(--text-muted); }

        input[type="text"], input[type="file"] {
            width: 100%; padding: 10px; margin-bottom: 12px; border-radius: 4px;
            border: 1px solid transparent; background: var(--bg-input); color: white; box-sizing: border-box; outline: none;
        }

        .save-row { display: flex; gap: 8px; margin-bottom: 15px; }
        .webhook-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; border-top: 1px solid #3f4147; padding-top: 15px; }
        .webhook-chip {
            background: #4e5058; padding: 6px 12px; border-radius: 15px; font-size: 13px;
            cursor: pointer; display: flex; align-items: center; gap: 8px;
        }
        .webhook-chip:hover { background: var(--discord-blurple); }

        .toolbar {
            display: flex; gap: 8px; background: #232428; padding: 10px;
            border-radius: 8px 8px 0 0; align-items: center;
        }
        .toolbar button, .toolbar select {
            background: #4e5058; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer;
        }

        #editor { 
            min-height: 150px; background: var(--bg-editor); padding: 16px;
            border-radius: 0 0 8px 8px; outline: none; line-height: 1.6; margin-bottom: 15px;
        }

        .file-section { margin-bottom: 20px; padding: 10px; background: #232428; border-radius: 8px; }

        .send-btn {
            background: var(--discord-blurple); color: white; width: 100%;
            border: none; padding: 16px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px;
        }
        .send-btn:hover { background: var(--discord-hover); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3>🔗 Webhook Manager</h3>
        <div class="save-row">
            <input type="text" id="nickName" placeholder="Name" style="flex: 1; margin: 0;">
            <input type="text" id="webhookUrl" placeholder="Webhook URL" style="flex: 2; margin: 0;">
            <button onclick="saveWebhook()" style="background: var(--discord-blurple); color: white; border: none; padding: 0 15px; border-radius: 4px; cursor: pointer;">Save</button>
        </div>
        <div class="webhook-list" id="webhookList"></div>
    </div>

    <div class="card">
        <h3>📝 Message & Files</h3>
        <div class="toolbar">
            <button onclick="exec('bold')"><b>B</b></button>
            <button onclick="exec('italic')"><i>I</i></button>
            <button onclick="exec('underline')"><u>U</u></button>
            <button onclick="exec('strikeThrough')"><s>S</s></button>
            <select onchange="exec('formatBlock', this.value); this.selectedIndex=0;">
                <option value="">Size</option>
                <option value="h1">Big</option>
                <option value="h2">Medium</option>
                <option value="p">Small</option>
            </select>
        </div>
        <div id="editor" contenteditable="true"></div>

        <div class="file-section">
            <label>Attach File (Optional)</label>
            <input type="file" id="fileInput">
        </div>

        <button class="send-btn" id="sendBtn" onclick="sendToDiscord()">Send to Discord</button>
    </div>
</div>

<script>
    let savedHooks = JSON.parse(localStorage.getItem('discordHooks') || '[]');

    function exec(cmd, val = null) { document.execCommand(cmd, false, val); }

    function renderHooks() {
        const list = document.getElementById('webhookList');
        list.innerHTML = '';
        savedHooks.forEach((hook, index) => {
            const chip = document.createElement('div');
            chip.className = 'webhook-chip';
            chip.innerHTML = `<span onclick="document.getElementById('webhookUrl').value='${hook.url}'">${hook.name}</span> <span onclick="deleteHook(${index})">×</span>`;
            list.appendChild(chip);
        });
    }

    function saveWebhook() {
        const name = document.getElementById('nickName').value;
        const url = document.getElementById('webhookUrl').value;
        if (name && url) {
            savedHooks.push({ name, url });
            localStorage.setItem('discordHooks', JSON.stringify(savedHooks));
            renderHooks();
            document.getElementById('nickName').value = '';
        }
    }

    function deleteHook(index) {
        savedHooks.splice(index, 1);
        localStorage.setItem('discordHooks', JSON.stringify(savedHooks));
        renderHooks();
    }

    async function sendToDiscord() {
        const url = document.getElementById('webhookUrl').value;
        const editor = document.getElementById('editor');
        const fileInput = document.getElementById('fileInput');
        const btn = document.getElementById('sendBtn');

        let content = editor.innerHTML
            .replace(/<h1>(.*?)<\/h1>/g, "# $1\n")
            .replace(/<h2>(.*?)<\/h2>/g, "## $1\n")
            .replace(/<b>(.*?)<\/b>|<strong>(.*?)<\/strong>/g, "**$1$2**")
            .replace(/<i>(.*?)<\/i>|<em>(.*?)<\/em>/g, "*$1$2*")
            .replace(/<u>(.*?)<\/u>/g, "__$1__")
            .replace(/<s>(.*?)<\/s>|<strike>(.*?)<\/strike>/g, "~~$1$2~~")
            .replace(/@@(\d+)@@/g, "<@$1>")
            .replace(/@(\d+)@/g, "<@&$1>")
            .replace(/<div>/g, "\n").replace(/<\/div>/g, "")
            .replace(/<br>/g, "\n")
            .replace(/&nbsp;/g, " ")
            .replace(/<[^>]*>/g, ""); 

        if (!url) return alert("Please select a webhook.");

        btn.disabled = true;
        btn.innerText = "Sending...";

        const formData = new FormData();
        
        // Discord needs the text content inside a 'payload_json' field when sending files
        formData.append('payload_json', JSON.stringify({ content: content }));

        if (fileInput.files.length > 0) {
            formData.append('file', fileInput.files[0]);
        }

        try {
            const res = await fetch(url, {
                method: 'POST',
                body: formData // No headers needed, Fetch handles multipart/form-data
            });

            if (res.ok) {
                alert("Sent successfully!");
                editor.innerHTML = "";
                fileInput.value = "";
            } else {
                alert("Error sending. Check your webhook URL.");
            }
        } catch (e) {
            alert("Connection error.");
        } finally {
            btn.disabled = false;
            btn.innerText = "Send to Discord";
        }
    }

    renderHooks();
</script>
</body>
</html>
